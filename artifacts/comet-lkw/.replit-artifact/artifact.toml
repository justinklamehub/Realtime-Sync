kind = "web"
previewPath = "/"
title = "COMET LKW-Verladungsverwaltung"
version = "1.0.0"
id = "artifacts/comet-lkw"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18454

[services.development]
run = "pnpm --filter @workspace/comet-lkw run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/comet-lkw", "run", "build" ]
publicDir = "artifacts/comet-lkw/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18454"
BASE_PATH = "/"
